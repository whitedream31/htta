<!DOCTYPE html>
<html>
<head>
  <title>Event Manager</title>
  <style>
    body{font-family:Arial;margin:40px;}
    table{border-collapse:collapse;width:100%;}
    th,td{border:1px solid #ccc;padding:6px;}
    th{cursor:pointer;background:#eee;}
    input,select{width:100%;box-sizing:border-box;}
    button{padding:4px 8px;}
    #refPreview{font-weight:bold;color:#666;}
  </style>
</head>
<body>
  <h2>Event Manager</h2>
  <button onclick="newEvent()">Add Event</button>
  <h2>Upcoming Events</h2>
  <table id="upcomingTable">
    <thead>
    <tr>
      <th onclick="sortTable('startdate','upcoming')">Date</th>
      <th onclick="sortTable('description','upcoming')">Description</th>
      <th>Venue</th>
      <th>Time</th>
      <th>Booking</th>
      <th></th>
    </tr>
    </thead>
    <tbody></tbody>
  </table>

  <h2>Past Events</h2>
  <table id="pastTable">
    <thead>
    <tr>
      <th>Date</th>
      <th>Description</th>
      <th>Venue</th>
      <th>Time</th>
      <th>Booking</th>
      <th></th>
    </tr>
    </thead>
    <tbody></tbody>
  </table>

  <h3 id="formTitle">New Event</h3>

  <div>
    <div>Ref preview: <span id="refPreview"></span></div>
    <input type="hidden" id="id">
    <label>Description</label>
    <input id="description" oninput="updateRef()">
    <label>Venue</label>
    <select id="venueid"></select>
    <label>Start date</label>
    <input type="date" id="startdate" onchange="updateRef()">
    <label>End date</label>
    <input type="date" id="enddate">
    <label>Start time</label>
    <input id="starttime">
    <label>Booking URL</label>
    <input id="bookingurl">
    <label>Content</label>
    <textarea id="content" rows="6"></textarea>
    <br><br>
    <button onclick="save()">Save</button>
  </div>

<script>
let events = []
let venues = []
let sortColumn = "startdate"

function slug(text) {
  return text
    .toLowerCase()
    .replace(/[^a-z0-9]+/g,"-")
    .replace(/^-|-$/g,"")
}

function updateRef() {
  let d = startdate.value
  let desc = description.value
  if(!d || !desc) {
    refPreview.innerText=""
  } else {
    let year = d.substring(0, 4)
    refPreview.innerText = year + "-" + slug(desc)
  }
}

async function copyEvent(id) {
  if(confirm("Copy this event?")) {
    let r = await fetch("scripts/Control/EventsManagement.php?action=copy", {
      method:"POST",
      headers: {
          "Content-Type":"application/json"
      },
      body:JSON.stringify({id:id})
    });
    let result = await r.json();
    if(!result.ok){
      alert("Copy failed");
      return;
    }

    // Optional: Show the new start date to the user
    alert("Event copied! New start date: " + result.new_start);

    // Reload the event tables
    await loadEvents();

    // Find the copied event in upcoming events
    let copiedEvent = events.upcoming.find(e => 
        e.startdate === result.new_start && 
        e.description === events.upcoming.find(ev => ev.id === id).description
    );

    if (copiedEvent) {
        // Highlight the row
        let rows = document.querySelectorAll("#upcomingTable tbody tr");
        for (let row of rows) {
            if (row.querySelector("button").onclick.toString().includes(copiedEvent.id)) {
                row.style.backgroundColor = "#fffa90"; // light yellow
                // Scroll into view
                row.scrollIntoView({ behavior: "smooth", block: "center" });
                // Remove highlight after 3 seconds
                setTimeout(() => { row.style.backgroundColor = ""; }, 3000);
                break;
            }
        }

        // Automatically open in edit mode
        edit(copiedEvent);
    }
  }
}

async function loadVenues() {
  let r = await fetch("scripts/Control/EventsManagement.php?action=venues")
  venues = await r.json()
  venueid.innerHTML = ""
  venues.forEach(v => {
    let o = document.createElement("option")
    o.value = v.id
    o.text = v.description
    venueid.appendChild(o)
  })
}

async function loadEvents() {
  let r = await fetch("scripts/Control/EventsManagement.php?action=list")
  let data = await r.json()
  renderTable(data.upcoming, "upcomingTable")
  renderTable(data.past, "pastTable")
}

function renderTable(events,tableId) {
  let tbody = document.querySelector("#"+tableId+" tbody")
  tbody.innerHTML = ""
  events.forEach(e => {
    let tr = document.createElement("tr")
    tr.innerHTML = `
      <td>${e.startdate}</td>
      <td>${e.description}</td>
      <td>${e.venue ?? ''}</td>
      <td>${e.starttime ?? ''}</td>
      <td>${e.bookingurl ?? ''}</td>
      <td>
      <button onclick='edit(${JSON.stringify(e)})'>Edit</button>
      <button onclick='copyEvent(${e.id})'>Copy</button>
      <button onclick='del(${e.id})'>Delete</button>
      </td>
    `
    tbody.appendChild(tr)
  })
}

function sortTable(col, type) {
  let list = type=="upcoming" ? events.upcoming : events.past
  list.sort((a,b) => {
    if (a[col] < b[col]) return -1
    if (a[col] > b[col]) return 1
    return 0
  })
  renderTable(list,type=="upcoming"?"upcomingTable":"pastTable")
}

function render() {
  let tbody = document.querySelector("#table tbody")
  tbody.innerHTML = ""
  events.forEach(e => {
    let tr = document.createElement("tr")
    tr.innerHTML = `
    <td>${e.startdate}</td>
    <td>${e.description}</td>
    <td>${e.venue ?? ''}</td>
    <td>${e.starttime ?? ''}</td>
    <td>${e.bookingurl ?? ''}</td>
    <td>
    <button onclick='edit(${JSON.stringify(e)})'>Edit</button>
    <button onclick='del(${e.id})'>Delete</button>
    </td>
    `
    tbody.appendChild(tr)
  })
}

function newEvent() {
  id.value = ""
  description.value = ""
  startdate.value = ""
  enddate.value = ""
  starttime.value = ""
  bookingurl.value = ""
  content.value = ""
  updateRef()
}

function edit(e) {
  id.value = e.id
  description.value = e.description
  venueid.value = e.venueid
  startdate.value = e.startdate
  enddate.value = e.enddate
  starttime.value = e.starttime
  bookingurl.value = e.bookingurl
  content.value = e.content
  updateRef()
  window.scrollTo(0, document.body.scrollHeight)
}

async function save() {
  let data = {
    id:id.value,
    description:description.value,
    venueid:venueid.value,
    startdate:startdate.value,
    enddate:enddate.value,
    starttime:starttime.value,
    bookingurl:bookingurl.value,
    content:content.value
  }
  await fetch("scripts/Control/EventsManagement.php?action=save", {
    method:"POST",
    body:JSON.stringify(data)
  })
  loadEvents()
  newEvent()
}

async function del(id) {
  if(confirm("Delete event?")) {
    await fetch("scripts/Control/EventsManagement.php?action=delete",{
    method:"POST",
    body:JSON.stringify({id})
    })
    loadEvents()
  }
}

loadVenues()
loadEvents()

</script>

</body>
</html>
